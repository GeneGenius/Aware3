<footer><em>Eugene &amp; Thando · 17 October 2026</em></footer>

<script>
const weddingDate = new Date('2026-10-17T10:00:00');
function updateCountdown() {
  const now = new Date();
  const diff = weddingDate - now;
  const label = document.getElementById('countdown-label');
  if (diff > 0) {
    label.textContent = 'Until the wedding';
    document.getElementById('cd-d').textContent = String(Math.floor(diff / 86400000)).padStart(2, '0');
    document.getElementById('cd-h').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
    document.getElementById('cd-m').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    document.getElementById('cd-s').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  } else {
    label.textContent = 'Happily married for';
    const since = now - weddingDate;
    document.getElementById('cd-d').textContent = String(Math.floor(since / 86400000)).padStart(2, '0');
    document.getElementById('cd-h').textContent = String(Math.floor((since % 86400000) / 3600000)).padStart(2, '0');
    document.getElementById('cd-m').textContent = String(Math.floor((since % 3600000) / 60000)).padStart(2, '0');
    document.getElementById('cd-s').textContent = String(Math.floor((since % 60000) / 1000)).padStart(2, '0');
  }
}
updateCountdown();
setInterval(updateCountdown, 1000);

// Scroll arrow fade-out
(function() {
  const arrow = document.getElementById('scrollArrow');
  const hero = document.querySelector('.hero');
  if (!arrow || !hero) return;
  window.addEventListener('scroll', function() {
    arrow.classList.toggle('hidden', window.scrollY > hero.offsetHeight * 0.3);
  }, { passive: true });
})();
</script>
